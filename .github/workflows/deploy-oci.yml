name: Deploy backend to OCI

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: deploy-backend-oci-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_SHA: ${{ github.sha }}
      OCI_HOST: ${{ secrets.OCI_HOST }}
      OCI_USER: ${{ secrets.OCI_USER }}
      OCI_KNOWN_HOSTS: ${{ secrets.OCI_KNOWN_HOSTS }}

    steps:
      - name: Checkout tested revision
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Build backend image
        run: docker build --build-arg APP_VERSION="$DEPLOY_SHA" --tag tri-read-be:latest .

      - name: Package backend image
        run: docker save tri-read-be:latest | gzip > /tmp/tri-read-be.tar.gz

      - name: Configure SSH
        shell: bash
        env:
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          test -n "$OCI_HOST"
          test -n "$OCI_USER"
          test -n "$OCI_SSH_PRIVATE_KEY"
          test -n "$OCI_KNOWN_HOSTS"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$OCI_SSH_PRIVATE_KEY" > ~/.ssh/oci
          chmod 600 ~/.ssh/oci
          printf '%s\n' "$OCI_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload deployment files
        shell: bash
        run: |
          scp -i ~/.ssh/oci deploy/compose.yaml deploy/Caddyfile \
            deploy/backup-db.sh deploy/restore-db.sh deploy/report-operation-event.sh \
            "$OCI_USER@$OCI_HOST:~/tri-read/"
          scp -i ~/.ssh/oci /tmp/tri-read-be.tar.gz \
            "$OCI_USER@$OCI_HOST:~/tri-read/tri-read-be.tar.gz"

      - name: Start services
        shell: bash
        run: |
          ssh -i ~/.ssh/oci "$OCI_USER@$OCI_HOST" '
            set -eu
            cd ~/tri-read
            test -f .env
            docker load --input tri-read-be.tar.gz
            docker compose --env-file .env -f compose.yaml up -d --no-build --remove-orphans
            docker compose --env-file .env -f compose.yaml up -d --no-deps --force-recreate caddy
            docker compose --env-file .env -f compose.yaml exec -T caddy \
              caddy validate --config /etc/caddy/Caddyfile
            rm tri-read-be.tar.gz
            docker image prune -f
            docker compose --env-file .env -f compose.yaml ps
            chmod 700 backup-db.sh restore-db.sh report-operation-event.sh
          '

      - name: Smoke test production
        shell: bash
        run: bash deploy/smoke-test.sh

      - name: Record successful deployment
        shell: bash
        run: |
          ssh -i ~/.ssh/oci "$OCI_USER@$OCI_HOST" \
            "bash ~/tri-read/report-operation-event.sh APP_DEPLOY SUCCESS '$DEPLOY_SHA deployed and smoke-tested'"
