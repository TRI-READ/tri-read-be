name: Backend CI

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.0.0

      - name: Validate operations scripts
        shell: bash
        run: bash -n deploy/backup-db.sh deploy/restore-db.sh deploy/smoke-test.sh deploy/verify-backup.sh

      - name: Test
        run: gradle test

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    uses: ./.github/workflows/deploy-oci.yml
    secrets: inherit
