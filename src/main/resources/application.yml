spring:
  application:
    name: tri-read-be
  profiles:
    default: dev
  flyway:
    enabled: true
  servlet:
    multipart:
      enabled: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  time-zone: Asia/Seoul
