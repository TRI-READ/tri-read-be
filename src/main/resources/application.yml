spring:
  application:
    name: tri-read-be
  profiles:
    default: dev
  flyway:
    enabled: true
  servlet:
    multipart:
      enabled: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  time-zone: Asia/Seoul
  quiz-generation:
    enabled: ${QUIZ_GENERATION_ENABLED:false}
    auto-publish: ${QUIZ_AUTO_PUBLISH:false}
    max-attempts: ${QUIZ_GENERATION_MAX_ATTEMPTS:3}
    pass-score: ${QUIZ_VALIDATION_PASS_SCORE:90}
    cron: ${QUIZ_GENERATION_CRON:0 0 3 * * SUN}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      generation-model: ${OPENAI_GENERATION_MODEL:gpt-5.4}
      validation-model: ${OPENAI_VALIDATION_MODEL:gpt-5.4-mini}
      prompt-version: ${QUIZ_PROMPT_VERSION:v1}
