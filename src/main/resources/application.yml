spring:
  application:
    name: tri-read-be
  config:
    import: optional:file:./config/application-secret.yml
  profiles:
    default: dev
  flyway:
    enabled: true
  servlet:
    multipart:
      enabled: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 30m
      cookie:
        name: TRI_READ_SESSION
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  time-zone: Asia/Seoul
  auth:
    bootstrap-admin-login-name: ${TRI_READ_ADMIN_LOGIN:}
    login-rate-limit:
      max-failures: ${LOGIN_RATE_LIMIT_MAX_FAILURES:10}
      window: ${LOGIN_RATE_LIMIT_WINDOW:10m}
  quiz-generation:
    enabled: ${QUIZ_GENERATION_ENABLED:false}
    auto-publish: ${QUIZ_AUTO_PUBLISH:false}
    max-attempts: ${QUIZ_GENERATION_MAX_ATTEMPTS:2}
    pass-score: ${QUIZ_VALIDATION_PASS_SCORE:90}
    variants-per-date: ${QUIZ_VARIANTS_PER_DATE:3}
    inventory-days: ${QUIZ_INVENTORY_DAYS:3}
    max-jobs-per-run: ${QUIZ_GENERATION_MAX_JOBS_PER_RUN:3}
    max-jobs-per-day: ${QUIZ_GENERATION_MAX_JOBS_PER_DAY:3}
    max-api-calls-per-day: ${QUIZ_GENERATION_MAX_API_CALLS_PER_DAY:6}
    ai-validation-enabled: ${QUIZ_AI_VALIDATION_ENABLED:false}
    retry-delay-ms: ${QUIZ_GENERATION_RETRY_DELAY_MS:10000}
    cron: ${QUIZ_GENERATION_CRON:0 10 3 * * *}
    recovery-cron: ${QUIZ_GENERATION_RECOVERY_CRON:0 30 5 * * *}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      generation-model: ${GEMINI_GENERATION_MODEL:gemini-3.1-flash-lite}
      validation-model: ${GEMINI_VALIDATION_MODEL:gemini-3.1-flash-lite}
      prompt-version: ${QUIZ_PROMPT_VERSION:v2}
