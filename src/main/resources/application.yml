spring:
  application:
    name: tri-read-be
  profiles:
    default: dev
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tri_read}
    username: ${POSTGRES_USER:tri_read_app}
    password: ${POSTGRES_PASSWORD:tri_read_dev}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  servlet:
    multipart:
      enabled: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  time-zone: Asia/Seoul

