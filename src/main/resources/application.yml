spring:
  application:
    name: tri-read-be
  config:
    import: optional:file:./config/application-secret.yml
  profiles:
    default: dev
  flyway:
    enabled: true
  servlet:
    multipart:
      enabled: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  time-zone: Asia/Seoul
  quiz-generation:
    enabled: ${QUIZ_GENERATION_ENABLED:false}
    auto-publish: ${QUIZ_AUTO_PUBLISH:false}
    max-attempts: ${QUIZ_GENERATION_MAX_ATTEMPTS:3}
    pass-score: ${QUIZ_VALIDATION_PASS_SCORE:90}
    variants-per-date: ${QUIZ_VARIANTS_PER_DATE:3}
    retry-delay-ms: ${QUIZ_GENERATION_RETRY_DELAY_MS:10000}
    cron: ${QUIZ_GENERATION_CRON:0 10 3 * * *}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      generation-model: ${GEMINI_GENERATION_MODEL:gemini-3.1-flash-lite}
      validation-model: ${GEMINI_VALIDATION_MODEL:gemini-3.1-flash-lite}
      prompt-version: ${QUIZ_PROMPT_VERSION:v1}
