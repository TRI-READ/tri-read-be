spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:15432/tri_read}
    username: ${POSTGRES_USER:tri_read_app}
    password: ${POSTGRES_PASSWORD:tri_read_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: tri-read-dev-pool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  servlet:
    session:
      cookie:
        secure: false
