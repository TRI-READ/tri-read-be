services:
  db:
    image: postgres:18-bookworm
    restart: unless-stopped
    mem_limit: 300m
    security_opt:
      - no-new-privileges:true
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=20
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: tri-read-be:latest
    restart: unless-stopped
    mem_limit: 480m
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    expose:
      - "8080"
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx320m -Xss256k -XX:+UseSerialGC
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    mem_limit: 96m
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/out:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
